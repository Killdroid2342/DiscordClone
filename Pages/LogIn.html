<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Discord</title>
    <link rel="icon" href="../assets/img/titlePic.png" sizes="32x32" type="image/png" />
    <link rel="stylesheet" href="../CSS/LogIn.css?v=3">
</head>
<body class="auth-page login-page">
    <div class="outerModal" aria-live="polite" role="status">
        <div class="innerModal">
            <p class="content"></p>
        </div>
    </div>
<div class="background">
<div class="logInFormDiv">
    <h2 class="logInHeader">Welcome back!</h2>
    <p class="headMessage">We're so excited to see you again!</p>
    <form class="outContent"  onsubmit="LogInForm(event)" method="post">
        <label class="usernameLogInLabel">USERNAME</label>
        <input type="text" class="usernameInput" name="username" autocomplete="username" required /> 
        <label class="passwordLogInLabel">PASSWORD</label>
        <input type="password" class="LogInpasswordInput" name="password" autocomplete="current-password" required />
        <input type="submit" class="logInButton" value="Log In" />
        <p class="switchToRegisterInfo">Need an account? <a href="Register.html" class="switchToRegister">Register</a></p>
    </form>
</div>
</div>
<script src="../node_modules/axios/dist/axios.min.js"></script>
<script src="../JS/AppConfig.js?v=1"></script>
<script src="../JS/AppPaths.js?v=1"></script>
<script src="../JS/Accounts.js?v=3"></script>

</body>
</html>
